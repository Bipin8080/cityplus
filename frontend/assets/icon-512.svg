<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="100%" style="stop-color:#112240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#64ffda"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- City skyline -->
  <rect x="80" y="260" width="50" height="120" rx="4" fill="url(#accent)" opacity="0.7"/>
  <rect x="145" y="200" width="55" height="180" rx="4" fill="url(#accent)" opacity="0.85"/>
  <rect x="215" y="240" width="45" height="140" rx="4" fill="url(#accent)" opacity="0.6"/>
  <rect x="275" y="180" width="60" height="200" rx="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="350" y="220" width="50" height="160" rx="4" fill="url(#accent)" opacity="0.75"/>
  <!-- Location pin -->
  <circle cx="360" cy="140" r="38" fill="#1e40af" stroke="#64ffda" stroke-width="3"/>
  <circle cx="360" cy="133" r="14" fill="#64ffda"/>
  <polygon points="360,185 345,155 375,155" fill="#1e40af"/>
  <!-- Plus sign -->
  <rect x="110" y="145" width="6" height="30" rx="3" fill="#64ffda"/>
  <rect x="98" y="157" width="30" height="6" rx="3" fill="#64ffda"/>
  <!-- Text -->
  <text x="256" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="58" font-weight="900" fill="#ccd6f6" letter-spacing="-1">CityPlus</text>
</svg>
